<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#111318">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vellum">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>VellumFE</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button id="topbar-title" type="button"
              title="Toggle between room and character name">&mdash;</button>
      <span id="topbar-right">
        <button id="settings-btn" type="button" aria-label="Settings" title="Settings">&#9881;</button>
        <button id="textsize-btn" type="button" aria-label="Text size" title="Text size">Aa</button>
        <button id="wake-btn" type="button" aria-label="Keep screen awake" title="Keep screen awake">&#9789;</button>
        <button id="logout-btn" type="button" aria-label="Disconnect from the game"
                title="Disconnect from the game" hidden>&#9211;</button>
        <span id="conn" class="conn conn-down">connecting&hellip;</span>
      </span>
    </header>
    <div id="session-banner" hidden></div>
    <nav id="chips"></nav>
    <main id="pane-wrap">
      <div id="text-pane"></div>
      <aside id="effects-panel"></aside>
      <div id="floating-layer"></div>
    </main>
    <footer id="bottombar">
      <div id="rt-bar"><div id="rt-fill"></div></div>
      <span id="rt-label"></span>
      <nav id="macro-rail" hidden>
        <button id="macro-group-btn" type="button"></button>
        <div id="macro-buttons"></div>
        <button id="macro-add" type="button" aria-label="Add or edit macros">&#65291;</button>
        <button id="macro-collapse" type="button" aria-label="Collapse macros">&#9662;</button>
      </nav>
      <div id="status-row">
        <span id="hands" hidden>
          <span class="hand"><span class="hand-tag">L</span><span id="hand-left">&mdash;</span></span>
          <span class="hand"><span class="hand-tag">R</span><span id="hand-right">&mdash;</span></span>
        </span>
        <span id="status-right">
          <button id="fx-buffs" class="fx-pill" type="button" hidden></button>
          <button id="fx-debuffs" class="fx-pill fx-bad" type="button" hidden></button>
          <span id="indicators"></span>
        </span>
      </div>
      <div id="vitals">
        <div class="vital" id="v-health"><div class="vital-fill"></div><span class="vital-label">HP</span></div>
        <div class="vital" id="v-mana"><div class="vital-fill"></div><span class="vital-label">MP</span></div>
        <div class="vital" id="v-stamina"><div class="vital-fill"></div><span class="vital-label">ST</span></div>
        <div class="vital" id="v-spirit"><div class="vital-fill"></div><span class="vital-label">SP</span></div>
      </div>
      <form id="input-row" autocomplete="off">
        <input id="cmd-input" type="text" autocomplete="off" autocapitalize="off"
               autocorrect="off" spellcheck="false" enterkeyhint="send" placeholder="command&hellip;">
        <button id="repeat-btn" type="button" aria-label="Repeat last command (hold for history)"
                title="Repeat last command (hold for history)">&#8635;</button>
        <button id="cmd-send" type="submit" aria-label="Send">&#10148;</button>
      </form>
    </footer>
  </div>
  <div id="pair-overlay" hidden>
    <form id="pair-form">
      <h2>Pair with VellumFE</h2>
      <p>Run <code>.webinfo</code> in Vellum and scan the QR code, or type
         the pairing token here.</p>
      <input id="pair-token" type="text" autocomplete="off" autocapitalize="off"
             autocorrect="off" spellcheck="false" placeholder="pairing token">
      <button type="submit">Connect</button>
    </form>
  </div>
  <div id="session-overlay" hidden>
    <div id="session-card">
      <div id="session-head">
        <h2>VellumFE</h2>
        <button id="session-settings" type="button" aria-label="Settings"
                title="Settings">&#9881;</button>
      </div>
      <p id="session-status" hidden></p>
      <p id="session-error" hidden></p>
      <div id="session-profiles"></div>
      <form id="session-form" autocomplete="off">
        <h3>New login</h3>
        <input id="login-account" type="text" placeholder="play.net account"
               autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false">
        <input id="login-password" type="password" placeholder="password"
               autocomplete="current-password">
        <input id="login-character" type="text" placeholder="character"
               autocapitalize="off" autocorrect="off" spellcheck="false">
        <select id="login-game">
          <option value="prime" selected>GemStone IV</option>
          <option value="platinum">GemStone IV Platinum</option>
          <option value="shattered">GemStone IV Shattered</option>
          <option value="test">GemStone IV Test</option>
          <option value="dr">DragonRealms</option>
          <option value="drplatinum">DragonRealms Platinum</option>
          <option value="drfallen">DragonRealms Fallen</option>
          <option value="drtest">DragonRealms Test</option>
        </select>
        <label id="login-save-row"><input id="login-save" type="checkbox"> Remember this login</label>
        <button id="login-submit" type="submit">Connect</button>
      </form>
    </div>
  </div>
  <div id="editor-overlay" hidden>
    <div id="editor-card">
      <div id="editor-titlebar">
        <span id="editor-title"></span>
        <button id="editor-close" type="button" aria-label="Close">&#10005;</button>
      </div>
      <textarea id="editor-text" autocomplete="off" autocapitalize="off"
                autocorrect="off" spellcheck="false"></textarea>
      <p id="editor-status" hidden></p>
      <div id="editor-actions">
        <input id="editor-file" type="file" accept=".toml,text/plain" hidden>
        <button id="editor-import" type="button">Import file</button>
        <button id="editor-export" type="button">Export</button>
        <button id="editor-save" type="button">Save</button>
      </div>
    </div>
  </div>
  <div id="hl-overlay" hidden>
    <div id="hl-card">
      <div id="hl-titlebar">
        <span id="hl-title"></span>
        <button id="hl-close" type="button" aria-label="Close">&#10005;</button>
      </div>
      <div id="hl-list-view">
        <button id="hl-new" type="button">&#65291; New rule</button>
        <div id="hl-list"></div>
      </div>
      <form id="hl-form" hidden autocomplete="off">
        <label>Name <input id="hl-name" type="text" autocapitalize="off" spellcheck="false"></label>
        <label>Pattern (regex) <input id="hl-pattern" type="text" autocapitalize="off"
               autocorrect="off" spellcheck="false"></label>
        <div class="hl-colors">
          <label>Text color <span class="hl-swatch" id="hl-fg-swatch"></span>
            <input id="hl-fg" type="text" placeholder="#ff0000 or empty" autocapitalize="off" spellcheck="false"></label>
          <label>Background <span class="hl-swatch" id="hl-bg-swatch"></span>
            <input id="hl-bg" type="text" placeholder="empty = none" autocapitalize="off" spellcheck="false"></label>
        </div>
        <label class="hl-check"><input id="hl-bold" type="checkbox"> Bold</label>
        <label class="hl-check"><input id="hl-line" type="checkbox"> Color entire line</label>
        <label>Sound file <input id="hl-sound" type="text" placeholder="e.g. alert (from sounds folder)"
               autocapitalize="off" spellcheck="false"></label>
        <p id="hl-status" hidden></p>
        <div id="hl-actions">
          <button id="hl-back" type="button">Back</button>
          <button id="hl-delete" type="button">Delete</button>
          <button id="hl-save" type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>
  <div id="sheet-backdrop" hidden></div>
  <div id="sheet" hidden>
    <div id="sheet-titlebar">
      <span id="sheet-title"></span>
      <button id="sheet-close" type="button" aria-label="Close">&#10005;</button>
    </div>
    <div id="sheet-items"></div>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
